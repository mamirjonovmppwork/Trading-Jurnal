<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Jurnali - Kirish</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/media.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        window.handleGoogleLogin = function(response) {
            if (response && response.credential) {
                // auth.js moduliga xabar yuboramiz
                const event = new CustomEvent('google-auth-success', { detail: response });
                window.dispatchEvent(event);
            }
        };
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 18px 0;
            color: #8a8fa3;
            font-size: 13px;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }
        .auth-divider span {
            padding: 0 12px;
        }
        /* Google tugmasini 350px gacha bo'lgan ekranlarda chiroyli markazlashtirish */
        .google-btn-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body class="auth-page">

    <div class="auth-container card">
        <a href="index.html" class="back-home">
            <i data-lucide="arrow-left"></i> <span>Bosh sahifa</span>
        </a>

        <h2>Tizimga Kirish</h2>
        <p class="auth-subtitle">Platformaga kiring va tahlillarni davom ettiring</p>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Elektron pochta (Email)</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" class="input-icon"></i>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Parol</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <span>Kirish</span> <i data-lucide="log-in"></i>
            </button>
        </form>

        <div class="auth-divider"><span>yoki</span></div>

        <div id="g_id_onload"
             data-client_id="797851218871-eo689hbme99a434fgf76dcknjj856tcr.apps.googleusercontent.com"
             data-callback="handleGoogleLogin"
             data-auto_prompt="false">
        </div>
        <div class="google-btn-container">
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="continue_with"
                 data-size="large"
                 data-width="320"
                 data-logo_alignment="left">
            </div>
        </div>

        <div class="auth-footer">
            <p>Akkountingiz yo'qmi? <a href="register.html">Ro'yxatdan o'tish</a></p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>

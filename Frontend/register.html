<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Jurnali - Ro'yxatdan o'tish</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/media.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* main.css'da divider stili bo'lmasa, shu yetarli bo'ladi */
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 18px 0;
            color: #8a8fa3;
            font-size: 13px;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }
        .auth-divider span {
            padding: 0 12px;
        }
    </style>
</head>
<body class="auth-page">

    <div class="auth-container card">
        <a href="index.html" class="back-home">
            <i data-lucide="arrow-left"></i> <span>Bosh sahifa</span>
        </a>

        <h2>Ro'yxatdan O'tish</h2>
        <p class="auth-subtitle">Platformada yangi profil yarating va nazoratni qo'lga oling</p>

        <form id="register-form">
            <div class="form-group">
                <label for="username">Foydalanuvchi nomi (Username)</label>
                <div class="input-wrapper">
                    <i data-lucide="user" class="input-icon"></i>
                    <input type="text" id="username" placeholder="trader1 kabi" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Elektron pochta (Email)</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" class="input-icon"></i>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Parol</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="input-icon"></i>
                    <input type="password" id="password" placeholder="Min. 6 ta belgi" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <span>Ro'yxatdan o'tish</span> <i data-lucide="user-plus"></i>
            </button>
        </form>

        <div class="auth-divider"><span>yoki</span></div>

        <!-- GOOGLE BILAN RO'YXATDAN O'TISH -->
        <div id="g_id_onload"
             data-client_id="797851218871-eo689hbme99a434fgf76dcknjj856tcr.apps.googleusercontent.com"
             data-callback="handleGoogleCredential"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signup_with"
             data-size="large"
             data-width="100%"
             data-logo_alignment="left">
        </div>

        <div class="auth-footer">
            <p>Akkountingiz bormi? <a href="login.html">Kirish</a></p>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Tasdiqlash</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
    <div class="auth-container card text-center">
        <div class="step-indicator">Qadam 1 / 2</div>
        
        <div class="auth-icon-wrapper">
            <i data-lucide="mail-check"></i>
        </div>
        <h2>Emailni Tasdiqlash</h2>
        <p class="auth-subtitle">
            Ixtiyoriy simulyatsiya qilingan bosqich. Tasdiqlash kodini olish uchun tugmani bosing.
        </p>
        
        <button id="verify-btn" class="submit-btn">
            <span>Emailni Tasdiqlash</span> <i data-lucide="shield-check"></i>
        </button>
        
        <button id="skip-btn" class="skip-link" style="background: none; border: none; cursor: pointer; font-family: inherit;">
            <span>O'tkazib yuborish</span> <i data-lucide="arrow-right"></i>
        </button>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Lucide iconlarni faollashtirish
        lucide.createIcons();

        // Har qanday holatda Dashboardga o'tkazish xavfsizlik funksiyasi
        function proceedToDashboard() {
            // Dashboardda token tekshiruvi borligi uchun token mavjudligini aniqlaymiz
            if (!localStorage.getItem('token')) {
                localStorage.setItem('token', 'temp_live_session_token');
            }
            window.location.href = 'dashboard.html';
        }

        // Tasdiqlash tugmasi bosilganda
        document.getElementById('verify-btn').addEventListener('click', async () => {
            // 1. Agar haqiqiy API sinfi (`api.js` ichida) mavjud bo'lsa, Render'ga so'rov yuboradi
            if (typeof api !== 'undefined' && typeof api.post === 'function') {
                try {
                    // Render backend endpointiga so'rov
                    const res = await api.post('/auth/verify', {});
                    alert(res.message || "Email muvaffaqiyatli tasdiqlandi!");
                    proceedToDashboard();
                } catch (err) {
                    console.error("Render Backend xatosi:", err);
                    alert("Backend xatosi: " + (err.message || "Xatolik yuz berdi. Lekin sizni dashboardga o'tkazamiz."));
                    proceedToDashboard(); // Muammo bo'lsa ham qolib ketmaysiz
                }
            } else {
                // 2. Agar API hali ulanmagan bo'lsa (Lokal test rejimida)
                alert("Lokal rejim: Email tasdiqlandi!");
                proceedToDashboard();
            }
        });

        // O'tkazib yuborish tugmasi bosilganda
        document.getElementById('skip-btn').addEventListener('click', () => {
            proceedToDashboard();
        });
    </script>
</body>
</html>
